<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .brand { font-weight: 700; font-size: 18px; color: #4f46e5; }
    header .auth-area { display: flex; align-items: center; gap: 12px; }
    .user-badge {
      background: #ede9fe;
      color: #4f46e5;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-link {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      color: #374151;
    }
    .btn-link:hover { background: #f3f4f6; }

    /* ── Main ── */
    main { max-width: 1100px; margin: 0 auto; padding: 64px 24px; }

    .hero { text-align: center; margin-bottom: 48px; }
    .hero h1 { font-size: 36px; font-weight: 800; margin-bottom: 12px; }
    .hero p { font-size: 18px; color: #6b7280; }
    #product-name { color: #4f46e5; }

    /* ── Interval toggle ── */
    .toggle-wrap { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 48px; }
    .toggle-label { font-size: 14px; font-weight: 500; color: #6b7280; }
    .toggle-label.active { color: #111; }
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      background: #4f46e5;
      border-radius: 13px;
      cursor: pointer;
      border: none;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: left 0.2s;
    }
    .toggle.annual::after { left: 25px; }
    .save-badge {
      background: #dcfce7;
      color: #16a34a;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
    }

    /* ── Cards ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }

    .card {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .card.featured {
      border-color: #4f46e5;
      box-shadow: 0 4px 24px rgba(79, 70, 229, 0.15);
    }
    .badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #4f46e5;
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 3px 12px;
      border-radius: 12px;
      white-space: nowrap;
    }

    .tier-name { font-size: 14px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .price-wrap { margin-bottom: 24px; }
    .price { font-size: 42px; font-weight: 800; line-height: 1; }
    .price sup { font-size: 20px; vertical-align: top; margin-top: 6px; }
    .price-interval { font-size: 13px; color: #9ca3af; margin-top: 4px; }
    .price-annual-note { font-size: 12px; color: #16a34a; margin-top: 2px; font-weight: 500; }

    .features { list-style: none; flex: 1; margin-bottom: 28px; }
    .features li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      font-size: 14px;
      color: #374151;
      border-bottom: 1px solid #f3f4f6;
    }
    .features li:last-child { border-bottom: none; }
    .features li .check { color: #4f46e5; font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .features li .val { font-weight: 600; color: #111; }

    .cta-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .cta-btn.primary { background: #4f46e5; color: white; }
    .cta-btn.primary:hover { background: #4338ca; }
    .cta-btn.secondary { background: white; color: #374151; border: 2px solid #e5e7eb; }
    .cta-btn.secondary:hover { background: #f9fafb; }
    .cta-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Auth modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      margin: 16px;
      position: relative;
    }
    .modal h2 { font-size: 22px; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #9ca3af;
    }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid #e5e7eb; }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      color: #6b7280;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .form-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .form-error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .form-error.show { display: block; }
    .form-submit {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .form-submit:hover { background: #4338ca; }
    .form-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── States ── */
    .loading-state { text-align: center; padding: 80px 0; color: #6b7280; }
    .loading-state .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 80px 0; }
    .error-state h2 { color: #991b1b; margin-bottom: 8px; }
    .error-state p { color: #6b7280; }
  </style>
</head>
<body>

<header>
  <div class="brand" id="header-brand">Pricing</div>
  <div class="auth-area" id="auth-area">
    <span style="color:#9ca3af;font-size:13px">Loading…</span>
  </div>
</header>

<main>
  <div class="hero">
    <h1>Simple, transparent pricing for <span id="product-name">…</span></h1>
    <p>Start free. Upgrade when you're ready. Cancel anytime.</p>
  </div>

  <div class="toggle-wrap" id="toggle-wrap" style="display:none">
    <span class="toggle-label active" id="lbl-monthly">Monthly</span>
    <button class="toggle" id="interval-toggle" aria-label="Toggle billing interval"></button>
    <span class="toggle-label" id="lbl-annual">Annual</span>
    <span class="save-badge" id="save-badge" style="display:none">Save ~10%</span>
  </div>

  <div id="cards-container">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading plans…</p>
    </div>
  </div>
</main>

<!-- Auth modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <h2>Get started</h2>
    <p>Sign in or create an account to subscribe.</p>
    <div class="tabs">
      <button class="tab active" id="tab-login">Sign In</button>
      <button class="tab" id="tab-register">Create Account</button>
    </div>
    <div class="form-error" id="form-error"></div>

    <!-- Login form -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="form-submit" id="btn-login">Sign In</button>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="yourname" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <button class="form-submit" id="btn-register">Create Account</button>
    </div>
  </div>
</div>

<script src="/js/pricing.js"></script>
</body>
</html>
